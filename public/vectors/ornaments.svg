<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Define symbols for ornaments -->
  <defs>
    <!-- Butterfly Pink -->
    <symbol id="butterfly-pink" viewBox="0 0 100 100">
      <ellipse cx="40" cy="45" rx="15" ry="20" fill="#FFC0CB"/>
      <ellipse cx="60" cy="45" rx="15" ry="20" fill="#FFC0CB"/>
      <ellipse cx="35" cy="30" rx="10" ry="15" fill="#FFB6C1"/>
      <ellipse cx="65" cy="30" rx="10" ry="15" fill="#FFB6C1"/>
      <circle cx="50" cy="50" r="5" fill="#F4A0B9"/>
    </symbol>

    <!-- Flower Pink -->
    <symbol id="flower-pink" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="8" fill="#FFD700"/>
      <circle cx="50" cy="20" r="10" fill="#FFB6C1"/>
      <circle cx="75" cy="30" r="10" fill="#FFB6C1"/>
      <circle cx="80" cy="55" r="10" fill="#FFB6C1"/>
      <circle cx="75" cy="80" r="10" fill="#FFB6C1"/>
      <circle cx="50" cy="80" r="10" fill="#FFB6C1"/>
      <circle cx="25" cy="80" r="10" fill="#FFB6C1"/>
      <circle cx="20" cy="55" r="10" fill="#FFB6C1"/>
      <circle cx="25" cy="30" r="10" fill="#FFB6C1"/>
    </symbol>

    <!-- Tree -->
    <symbol id="tree" viewBox="0 0 100 100">
      <path d="M 50 10 L 70 40 L 85 40 L 55 70 L 70 80 L 45 85 L 50 100 L 50 90 L 30 85 L 45 80 L 15 40 L 30 40 Z" fill="#8B7355"/>
      <polygon points="50,5 65,35 35,35" fill="#228B22"/>
      <polygon points="50,25 70,50 30,50" fill="#32CD32"/>
      <polygon points="50,45 75,70 25,70" fill="#228B22"/>
    </symbol>

    <!-- Butterfly Blue -->
    <symbol id="butterfly-blue" viewBox="0 0 100 100">
      <ellipse cx="40" cy="45" rx="15" ry="20" fill="#87CEEB"/>
      <ellipse cx="60" cy="45" rx="15" ry="20" fill="#87CEEB"/>
      <ellipse cx="35" cy="30" rx="10" ry="15" fill="#4169E1"/>
      <ellipse cx="65" cy="30" rx="10" ry="15" fill="#4169E1"/>
      <circle cx="50" cy="50" r="5" fill="#1E90FF"/>
    </symbol>

    <!-- Flower Yellow -->
    <symbol id="flower-yellow" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="8" fill="#FF6B6B"/>
      <circle cx="50" cy="20" r="10" fill="#FFD700"/>
      <circle cx="75" cy="30" r="10" fill="#FFDE59"/>
      <circle cx="80" cy="55" r="10" fill="#FFD700"/>
      <circle cx="75" cy="80" r="10" fill="#FFDE59"/>
      <circle cx="50" cy="80" r="10" fill="#FFD700"/>
      <circle cx="25" cy="80" r="10" fill="#FFDE59"/>
      <circle cx="20" cy="55" r="10" fill="#FFD700"/>
      <circle cx="25" cy="30" r="10" fill="#FFDE59"/>
    </symbol>

    <!-- Dove -->
    <symbol id="dove" viewBox="0 0 100 100">
      <ellipse cx="50" cy="50" rx="20" ry="15" fill="#FFFFFF"/>
      <circle cx="65" cy="45" r="8" fill="#FFFFFF"/>
      <polygon points="73,45 78,43 73,47" fill="#FFD700"/>
      <path d="M 30 60 Q 20 65 15 75" stroke="#FFFFFF" stroke-width="3" fill="none"/>
      <path d="M 70 60 Q 80 65 85 75" stroke="#FFFFFF" stroke-width="3" fill="none"/>
    </symbol>
  </defs>

  <!-- Scattered ornaments (this is a template file) -->
  <use href="#butterfly-pink" x="50" y="50" width="80" height="80"/>
  <use href="#flower-pink" x="150" y="100" width="60" height="60"/>
  <use href="#tree" x="250" y="20" width="120" height="150"/>
  <use href="#butterfly-blue" x="400" y="150" width="70" height="70"/>
  <use href="#flower-yellow" x="550" y="80" width="65" height="65"/>
  <use href="#dove" x="700" y="200" width="90" height="90"/>
</svg>
